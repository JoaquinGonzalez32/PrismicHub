<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisimic · Content Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --ink: #0A0A0A;
  --ink-muted: #6B6560;
  --ink-light: #9E9893;
  --border: #E5E0D8;
  --border-light: #EFEBE5;
  --accent: #B5533E;
  --accent-hover: #9E4532;
  --gold: #C9A96E;
  --gold-light: #F0E6D2;
  --danger: #C53030;
  --danger-bg: #FEE2E2;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --radius: 4px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 3px rgba(10,10,10,0.04);
  --shadow-md: 0 4px 20px rgba(10,10,10,0.08);
  --shadow-lg: 0 12px 40px rgba(10,10,10,0.12);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

/* ─── Grain Overlay ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ─── Header ─── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  background: rgba(245, 243, 238, 0.92);
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-img {
  height: 40px;
  width: auto;
  display: block;
  mix-blend-mode: multiply;
}
.logo-sub {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  border-left: 1px solid var(--border);
  padding-left: 8px;
  margin-left: 2px;
}

/* ─── Nav Tabs ─── */
.nav-tabs {
  display: flex;
  gap: 2px;
  background: var(--border-light);
  border-radius: 6px;
  padding: 3px;
}
.nav-tab {
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 8px 20px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

/* ─── Main Container ─── */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ─── Filters ─── */
.filters {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  margin-right: 8px;
}
.filter-btn {
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-btn:hover {
  border-color: var(--ink-muted);
  color: var(--ink);
}
.filter-btn.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.filter-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.filter-btn.active .filter-dot { background: var(--surface) !important; }

/* ─── Pilar Checklist (multi-select with checkboxes) ─── */
.pilar-checklist {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  padding: 5px;
  max-height: 156px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.pilar-check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.82rem;
  font-family: var(--font-body);
  transition: background var(--transition);
  user-select: none;
}
.pilar-check-item:hover { background: var(--surface); }
.pilar-check-item input[type="checkbox"] {
  width: 14px;
  height: 14px;
  margin: 0;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.pilar-check-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.pilar-check-key {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  min-width: 42px;
}
.pilar-check-label {
  color: var(--ink);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.pilar-check-item.orphan .pilar-check-label { font-style: italic; color: var(--ink-light); }

/* ─── Sort Bar ─── */
.sort-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: -14px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.sort-btn {
  font-family: var(--font-body);
  font-size: 0.74rem;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--ink-light);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
}
.sort-btn:hover {
  border-color: var(--ink-muted);
  color: var(--ink);
}
.sort-btn.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.sort-btn svg { width: 12px; height: 12px; }

.sort-dir-btn {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 6px 12px 6px 10px;
  border: 1px dashed var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-left: 4px;
}
.sort-dir-btn:hover {
  border-style: solid;
  border-color: var(--ink-muted);
  color: var(--ink);
}
.sort-dir-icon {
  width: 13px;
  height: 13px;
  transition: transform var(--transition);
}
.sort-dir-btn.asc .sort-dir-icon { transform: rotate(180deg); }

/* ─── Grid group header (sort by pilar) ─── */
.grid-group-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px 0 6px;
  margin-top: 4px;
  border-bottom: 1px solid var(--border-light);
}
.grid-group-header:first-child { margin-top: 0; padding-top: 0; }
.grid-group-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.grid-group-title {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 400;
  letter-spacing: -0.01em;
}
.grid-group-count {
  font-size: 0.7rem;
  color: var(--ink-light);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ─── Manage Pillars Button ─── */
.manage-pillars-btn {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 7px 12px;
  border: 1px dashed var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--ink-light);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 4px;
}
.manage-pillars-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.manage-pillars-btn svg { width: 14px; height: 14px; }

/* ─── Content Grid ─── */
.content-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 22px;
}
@media (max-width: 760px) {
  .content-grid { grid-template-columns: 1fr; }
}

/* ─── Content Card ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
  opacity: 0;
  transform: translateY(12px);
  animation: cardIn 0.5s ease forwards;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--border);
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

.card-stripe { height: 3px; width: 100%; }
.card-body { padding: 20px 22px 18px; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 3px;
}
.card-tags {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}
.card-tags .pilar-pill {
  font-size: 0.62rem;
  padding: 3px 9px;
  letter-spacing: 0.06em;
}
.card-channel, .card-format {
  font-size: 0.7rem;
  color: var(--ink-light);
  letter-spacing: 0.02em;
}
.card-channel::before {
  content: '·';
  margin-right: 6px;
  color: var(--border);
}
.card-date {
  margin-left: auto;
  font-size: 0.68rem;
  font-weight: 500;
  color: var(--ink-light);
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border: 1px solid var(--border-light);
  border-radius: 100px;
  background: var(--bg);
  white-space: nowrap;
}
.card-date svg { width: 11px; height: 11px; opacity: 0.75; }
.card-date.no-date { opacity: 0.6; font-style: italic; }
.card-title {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.card-copy {
  font-size: 0.9rem;
  color: var(--ink-muted);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 16px;
}
.card-actions {
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border-light);
  padding-top: 14px;
}
.btn {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 7px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
  text-transform: uppercase;
}
.btn-primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.btn-primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.btn-outline {
  background: transparent;
  color: var(--ink-muted);
  border-color: var(--border);
}
.btn-outline:hover {
  border-color: var(--ink);
  color: var(--ink);
}
.btn-danger {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
  padding: 5px 10px;
  font-size: 0.7rem;
}
.btn-danger:hover {
  background: var(--danger);
  color: white;
}

/* ─── Modal (shared) ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10, 10, 10, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.modal-overlay.open {
  display: flex;
  opacity: 1;
}
.modal-overlay.closing { opacity: 0; }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 680px;
  max-height: 88vh;
  border-radius: 12px 12px 4px 4px;
  overflow-y: auto;
  transform: translateY(30px);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-overlay.closing .modal { transform: translateY(30px); }

.modal-header {
  padding: 28px 32px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-close {
  background: none;
  border: 1px solid var(--border);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--ink-muted);
  transition: all var(--transition);
  flex-shrink: 0;
}
.modal-close:hover {
  border-color: var(--ink);
  color: var(--ink);
}

.modal-pillar-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.pilar-pill {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 3px;
  display: inline-block;
  white-space: nowrap;
}
.pilar-pill.orphan {
  background: #ECECEC;
  color: #666;
  font-style: italic;
}

.modal-content { padding: 20px 32px 32px; }

.modal-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.modal-meta {
  font-size: 0.78rem;
  color: var(--ink-light);
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
}
.modal-section { margin-bottom: 24px; }
.modal-section-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-bottom: 8px;
}

/* ─── Textarea + Voice ─── */
.textarea-wrapper {
  position: relative;
}
.modal-textarea {
  width: 100%;
  min-height: 140px;
  font-family: var(--font-body);
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 50px 14px 16px;
  resize: vertical;
  transition: border-color var(--transition);
  background: var(--bg);
}
.modal-textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.voice-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  color: var(--ink-muted);
}
.voice-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.voice-btn.recording {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  animation: pulse 1.5s ease infinite;
}
.voice-btn svg { width: 16px; height: 16px; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(181, 83, 62, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(181, 83, 62, 0); }
}

.modal-note {
  background: var(--gold-light);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  font-size: 0.84rem;
  color: var(--ink-muted);
  line-height: 1.55;
  border-radius: 0 var(--radius) var(--radius) 0;
}
.modal-save-row {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 28px;
}

/* ─── Comments Section ─── */
.comments-section {
  border-top: 1px solid var(--border-light);
  padding-top: 24px;
}
.comment-type-toggle {
  display: flex;
  gap: 2px;
  background: var(--border-light);
  border-radius: 4px;
  padding: 2px;
  margin-bottom: 12px;
  width: fit-content;
}
.comment-type-btn {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 6px 14px;
  border: none;
  border-radius: 3px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.comment-type-btn.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.comment-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.comment-input {
  flex: 1;
  font-family: var(--font-body);
  font-size: 0.84rem;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--ink);
  transition: border-color var(--transition);
}
.comment-input:focus {
  outline: none;
  border-color: var(--accent);
}
.comment-list { display: flex; flex-direction: column; gap: 12px; }
.comment-item {
  padding: 12px 16px;
  background: var(--bg);
  border-radius: var(--radius);
  position: relative;
}
.comment-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.comment-item-type {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 2px;
}
.comment-item-time {
  font-size: 0.7rem;
  color: var(--ink-light);
}
.comment-item-text {
  font-size: 0.84rem;
  color: var(--ink-muted);
  line-height: 1.5;
}
.comment-delete {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: var(--ink-light);
  cursor: pointer;
  font-size: 0.9rem;
  opacity: 0;
  transition: opacity var(--transition);
}
.comment-item:hover .comment-delete { opacity: 1; }
.comment-delete:hover { color: var(--accent); }

/* ─── Calendar View ─── */
.calendar-view { display: none; }
.calendar-view.active { display: block; }
.ideas-view.active { display: block; }
.ideas-view { display: none; }

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.cal-month-label {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
}

.calendar-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}
.calendar-table {
  width: 100%;
  min-width: 800px;
  border-collapse: collapse;
  background: var(--surface);
}
.calendar-table th {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  padding: 16px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.calendar-table td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: top;
  min-height: 80px;
}
.calendar-table tr:last-child td { border-bottom: none; }

.cal-week-label {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--ink);
  white-space: nowrap;
}
.cal-week-dates {
  font-size: 0.7rem;
  color: var(--ink-light);
  margin-top: 2px;
}
.cal-item {
  margin-bottom: 8px;
  padding: 8px 10px;

<script>
/* ═══════════════════════════════════════
   Prisimic Content Hub — Supabase Edition
   ═══════════════════════════════════════ */

const SUPABASE_URL = 'https://uekourtwsiibnsnxvbvv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVla291cnR3c2lpYm5zbnh2YnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzMzNzAsImV4cCI6MjA5MTQwOTM3MH0.GLYVstjVuPnGThZoh1gkJC2y57RN9YksGNRBVxAbGG4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
/* ─── State ─── */
let PILARS = {};
let CHANNELS_LIST = [];
let FORMATS_LIST = [];
let contentPieces = [];
let editsCount = 0;
let totalComments = 0;
let currentFilter = 'all';
let currentSort = 'publication'; // 'publication' | 'creation' | 'pilar'
// Defaults por modo: publicación = próxima primero (asc),
// creación = más reciente primero (desc), pilar = asc dentro del grupo.
const SORT_DEFAULT_DIR = { publication: 'asc', creation: 'desc', pilar: 'asc' };
let currentSortDir = SORT_DEFAULT_DIR.publication; // 'asc' | 'desc'
let currentCommentType = 'comment';
let currentPieceId = null;
let calendarYear = new Date().getFullYear();
let calendarMonth = new Date().getMonth();

/* ─── Supabase: Pillars ─── */
async function fetchPillars() {
  const { data, error } = await sb.from('pillars').select('*').order('key');
  if (error) { console.error('Error fetching pillars:', error); return; }
  PILARS = {};
  data.forEach(p => { PILARS[p.key] = { label: p.label, color: p.color, bg: p.bg }; });
}

async function upsertPillar(key, label, color, bg) {
  const { error } = await sb.from('pillars').upsert({ key, label, color, bg });
  if (error) console.error('Error upserting pillar:', error);
}

async function deletePillar(key) {
  const { error } = await sb.from('pillars').delete().eq('key', key);
  if (error) console.error('Error deleting pillar:', error);
}

/* ─── Supabase: Channels ─── */
async function fetchChannels() {
  const { data, error } = await sb.from('channels').select('*').order('id');
  if (error) { console.error('Error fetching channels:', error); return; }
  CHANNELS_LIST = data.map(c => c.name);
}

async function syncChannels(names) {
  // Delete all and re-insert
  await sb.from('channels').delete().neq('id', 0);
  if (names.length) {
    await sb.from('channels').insert(names.map(n => ({ name: n })));
  }
  CHANNELS_LIST = [...names];
}

/* ─── Supabase: Formats ─── */
async function fetchFormats() {
  const { data, error } = await sb.from('formats').select('*').order('id');
  if (error) { console.error('Error fetching formats:', error); return; }
  FORMATS_LIST = data.map(f => f.name);
}

async function syncFormats(names) {
  await sb.from('formats').delete().neq('id', 0);
  if (names.length) {
    await sb.from('formats').insert(names.map(n => ({ name: n })));
  }
  FORMATS_LIST = [...names];
}

/* ─── Supabase: Content ─── */
async function fetchContent() {
  const { data, error } = await sb.from('content_pieces').select('*').order('id');
  if (error) { console.error('Error fetching content:', error); return; }
  contentPieces = data;
}

async function fetchCommentsForPiece(pieceId) {
  const { data, error } = await sb.from('comments').select('*').eq('piece_id', pieceId).order('created_at');
  if (error) { console.error('Error fetching comments:', error); return []; }
  return data || [];
}

async function fetchTotalComments() {
  const { count, error } = await sb.from('comments').select('*', { count: 'exact', head: true });
  if (error) return 0;
  return count || 0;
}

async function fetchEdits() {
  const { data, error } = await sb.from('metadata').select('value').eq('key', 'edits').single();
  if (error) return 0;
  return data?.value || 0;
}

async function updateCopy(pieceId, newCopy) {
  const { error } = await sb.from('content_pieces').update({ copy: newCopy, updated_at: new Date().toISOString() }).eq('id', pieceId);
  return !error;
}

async function incrementEdits() {
  editsCount++;
  await sb.from('metadata').update({ value: editsCount }).eq('key', 'edits');
}

async function insertComment(pieceId, type, text) {
  const { data, error } = await sb.from('comments').insert({ piece_id: pieceId, type, text }).select().single();
  if (error) return null;
  return data;
}

async function removeComment(commentId) {
  const { error } = await sb.from('comments').delete().eq('id', commentId);
  return !error;
}

/* ─── Helpers ─── */
function getPiece(id) { return contentPieces.find(c => c.id === id); }

function formatTime(iso) {
  return new Date(iso).toLocaleString('es-AR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function buildPilarChecklistHtml(selectedKeys = []) {
  const selected = new Set(selectedKeys);
  const orphanKeys = selectedKeys.filter(k => !PILARS[k]);
  const orphanHtml = orphanKeys.map(k => `
    <label class="pilar-check-item orphan">
      <input type="checkbox" value="${escapeHtml(k)}" checked>
      <span class="pilar-check-dot" style="background:#999"></span>
      <span class="pilar-check-key">${escapeHtml(k)}</span>
      <span class="pilar-check-label">(no existe)</span>
    </label>`).join('');
  const items = Object.entries(PILARS).map(([key, p]) => `
    <label class="pilar-check-item">
      <input type="checkbox" value="${escapeHtml(key)}"${selected.has(key) ? ' checked' : ''}>
      <span class="pilar-check-dot" style="background:${p.color}"></span>
      <span class="pilar-check-key">${escapeHtml(key)}</span>
      <span class="pilar-check-label">${escapeHtml(p.label)}</span>
    </label>`).join('');
  return orphanHtml + items;
}

function getPilarChecklistValue(containerId) {
  const boxes = document.querySelectorAll(`#${containerId} input[type="checkbox"]:checked`);
  return Array.from(boxes).map(b => b.value).join(',');
}

// Checklist genérico (sin color/key) para canales y formatos.
function buildSimpleChecklistHtml(items, selectedList = []) {
  const selected = new Set(selectedList);
  const itemSet = new Set(items);
  const orphanKeys = selectedList.filter(v => !itemSet.has(v));
  const orphanHtml = orphanKeys.map(v => `
    <label class="pilar-check-item orphan">
      <input type="checkbox" value="${escapeHtml(v)}" checked>
      <span class="pilar-check-label">${escapeHtml(v)} <em style="font-style:italic;color:var(--ink-light)">(no existe)</em></span>
    </label>`).join('');
  const itemsHtml = items.map(v => `
    <label class="pilar-check-item">
      <input type="checkbox" value="${escapeHtml(v)}"${selected.has(v) ? ' checked' : ''}>
      <span class="pilar-check-label">${escapeHtml(v)}</span>
    </label>`).join('');
  return orphanHtml + itemsHtml;
}

// Parseo genérico de lista separada por coma (canales/formatos).
function parseList(val) {
  if (!val) return [];
  return String(val).split(',').map(s => s.trim()).filter(Boolean);
}

function listMatches(val, filter) {
  return parseList(val).includes(filter);
}

function listDisplay(val) {
  return parseList(val).join(' · ');
}

function formatShortDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  if (isNaN(d)) return '';
  return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short', year: 'numeric' });
}

const CAL_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

function pilarStyle(key, prop) {
  const p = PILARS[key];
  if (!p) return '';
  if (prop === 'color') return p.color;
  if (prop === 'bg') return p.bg;
  if (prop === 'label') return p.label;
  return '';
}

// Multi-pilar support: a piece.pilar may be a single key ("ed") or
// several comma-separated keys ("ed,aw"). Helpers:
function parsePilars(val) {
  if (!val) return [];
  return String(val).split(',').map(s => s.trim()).filter(Boolean);
}

function pilarDisplay(val) {
  const keys = parsePilars(val);
  if (!keys.length) return { color: '#999', bg: '#f0f0f0', label: val || '' };
  if (keys.length === 1) {
    const k = keys[0];
    const p = PILARS[k];
    if (!p) return { color: '#999', bg: '#f0f0f0', label: k };
    return { color: p.color, bg: p.bg, label: p.label };
  }
  // Multiple selected → mostrar las keys asociadas
  const first = PILARS[keys[0]];
  return {
    color: first?.color || '#555',
    bg: first?.bg || '#ECECEC',
    label: keys.join(' · ')
  };
}

function pilarMatches(val, filter) {
  return parsePilars(val).includes(filter);
}

// Renderiza una pill individual por cada pilar seleccionado, lado a lado.
// Cada pill muestra la key con los colores propios del pilar.
function pilarTagsHtml(val) {
  const keys = parsePilars(val);
  if (!keys.length) return '';
  return keys.map(k => {
    const p = PILARS[k];
    if (!p) {
      return `<span class="pilar-pill orphan" title="${escapeHtml(k)} (no existe)">${escapeHtml(k)}</span>`;
    }
    return `<span class="pilar-pill" style="background:${p.bg};color:${p.color}" title="${escapeHtml(p.label)}">${escapeHtml(k)}</span>`;
  }).join('');
}

// Color principal (primera key válida) para la franja lateral/tarjetas.
function pilarPrimaryColor(val) {
  const keys = parsePilars(val);
  for (const k of keys) {
    if (PILARS[k]) return PILARS[k].color;
  }
  return '#999';
}

function lightenColor(hex, amount = 0.85) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const lr = Math.round(r + (255 - r) * amount);
  const lg = Math.round(g + (255 - g) * amount);
  const lb = Math.round(b + (255 - b) * amount);
  return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
}

/* ─── Render Filters ─── */

  const allBtn = '<button class="filter-btn active" data-filter="all">Todos</button>';
  const pillarBtns = Object.entries(PILARS).map(([key, p]) =>
    `<button class="filter-btn" data-filter="${key}">
      <span class="filter-dot" style="background:${p.color}"></span>
      ${escapeHtml(p.label)}
    </button>`
  ).join('');
  const manageBtn = `<button class="manage-pillars-btn" id="open-pillars-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>`;

  bar.innerHTML = `<span class="filter-label">Filtrar</span>${allBtn}${pillarBtns}${manageBtn}`;
  bindFilterEvents();
}

function bindFilterEvents() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });
  const openBtn = document.getElementById('open-pillars-btn');
  if (openBtn) openBtn.addEventListener('click', openPillarsModal);
}

function updateSortDirUi() {
  const btn = document.getElementById('sort-dir-btn');
  if (!btn) return;
  btn.classList.toggle('asc', currentSortDir === 'asc');
  btn.querySelector('.sort-dir-label').textContent =
    currentSortDir === 'asc' ? 'Ascendente' : 'Descendente';
}

function bindSortEvents() {
  document.querySelectorAll('#sort-bar .sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#sort-bar .sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      currentSortDir = SORT_DEFAULT_DIR[currentSort] || 'desc';
      updateSortDirUi();
      renderGrid();
    });
  });
  const dirBtn = document.getElementById('sort-dir-btn');
  if (dirBtn) {
    dirBtn.addEventListener('click', () => {
      currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
      updateSortDirUi();
      renderGrid();
    });
  }
  updateSortDirUi();
}

/* ─── Render Cards ─── */
function renderCardHtml(piece, i) {
  const stripeColor = pilarPrimaryColor(piece.pilar);
  const tags = pilarTagsHtml(piece.pilar);
  const dateStr = formatShortDate(piece.scheduled_date);
  const dateEl = dateStr
    ? `<span class="card-date" title="Fecha de publicación">${CAL_ICON_SVG}${escapeHtml(dateStr)}</span>`
    : `<span class="card-date no-date" title="Sin fecha de publicación">${CAL_ICON_SVG}Sin fecha</span>`;
  return `
    <article class="card" style="animation-delay:${Math.min(i, 12) * 0.04}s" data-id="${piece.id}">
      <div class="card-stripe" style="background:${stripeColor}"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-tags">${tags}</span>
          <span class="card-channel">${escapeHtml(listDisplay(piece.channel))}</span>
          <span class="card-format">· ${escapeHtml(listDisplay(piece.format))}</span>
          ${dateEl}
        </div>
        <h3 class="card-title">${escapeHtml(piece.title)}</h3>
        <p class="card-copy">${escapeHtml(piece.copy).replace(/\n/g, ' ')}</p>
        <div class="card-actions">
          <button class="btn btn-primary" onclick="openModal(${piece.id}, 'edit')">Ver y editar</button>
          <button class="btn btn-outline" onclick="openModal(${piece.id}, 'comment')">Comentar</button>
          <button class="btn btn-danger" style="margin-left:auto" onclick="event.stopPropagation();deletePiece(${piece.id})">Eliminar</button>
        </div>
      </div>
    </article>`;
}

function sortByPublication(a, b) {
  const da = a.scheduled_date, db = b.scheduled_date;
  if (!da && !db) return (b.id || 0) - (a.id || 0);
  if (!da) return 1;   // sin fecha siempre al final
  if (!db) return -1;
  const cmp = da.localeCompare(db);
  return currentSortDir === 'asc' ? cmp : -cmp;
}

function sortByCreation(a, b) {
  // created_at si existe, sino id
  const ca = a.created_at || '', cb = b.created_at || '';
  let cmp;
  if (ca && cb) cmp = ca.localeCompare(cb);
  else cmp = (a.id || 0) - (b.id || 0);
  return currentSortDir === 'asc' ? cmp : -cmp;
}

function renderGrid() {
  const grid = document.getElementById('content-grid');
  const filtered = currentFilter === 'all'
    ? contentPieces.slice()
    : contentPieces.filter(c => pilarMatches(c.pilar, currentFilter));

  if (!filtered.length) {
    grid.innerHTML = '<p style="color:var(--ink-light);font-style:italic;grid-column:1/-1;text-align:center;padding:40px 0">No hay piezas para mostrar.</p>';
    return;
  }

  if (currentSort === 'pilar') {
    // Agrupar por cada key (una pieza con múltiples pilares aparece en cada grupo)
    const groups = {};
    filtered.forEach(piece => {
      const keys = parsePilars(piece.pilar);
      if (!keys.length) {
        (groups['__sin_pilar__'] = groups['__sin_pilar__'] || []).push(piece);
      } else {
        keys.forEach(k => { (groups[k] = groups[k] || []).push(piece); });
      }
    });
    // Orden: primero las keys definidas en PILARS (en su orden), luego huérfanas, luego sin pilar
    const pilarKeys = Object.keys(PILARS);
    const orderedKeys = [
      ...pilarKeys.filter(k => groups[k]),
      ...Object.keys(groups).filter(k => !pilarKeys.includes(k) && k !== '__sin_pilar__'),
      ...(groups['__sin_pilar__'] ? ['__sin_pilar__'] : [])
    ];
    let idx = 0;
    grid.innerHTML = orderedKeys.map(k => {
      const isSinPilar = k === '__sin_pilar__';
      const p = PILARS[k];
      const color = p?.color || '#999';
      const title = isSinPilar ? 'Sin pilar' : (p?.label || k);
      const items = groups[k].slice().sort(sortByPublication);
      const header = `
        <div class="grid-group-header">
          <span class="grid-group-dot" style="background:${color}"></span>
          <span class="grid-group-title">${escapeHtml(title)}</span>
          <span class="grid-group-count">${items.length} ${items.length === 1 ? 'pieza' : 'piezas'}</span>
        </div>`;
      const cards = items.map(piece => renderCardHtml(piece, idx++)).join('');
      return header + cards;
    }).join('');
    return;
  }

  const sorted = filtered.sort(currentSort === 'creation' ? sortByCreation : sortByPublication);
  grid.innerHTML = sorted.map((piece, i) => renderCardHtml(piece, i)).join('');
}

/* ─── Render Calendar ─── */
function getMonthWeeks(year, month) {
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const weeks = [];
  // Start from Monday of the week containing the 1st
  let ws = new Date(firstDay);
  const dow = ws.getDay();
  ws.setDate(ws.getDate() - ((dow + 6) % 7));
  ws.setHours(0, 0, 0, 0);
  while (ws <= lastDay) {
    const we = new Date(ws);
    we.setDate(we.getDate() + 6);
    we.setHours(23, 59, 59, 999); // include all of Sunday
    weeks.push({ start: new Date(ws), end: new Date(we) });
    ws.setDate(ws.getDate() + 7);
  }
  return weeks;
}

function shortDate(d) {
  return d.getDate() + ' ' + MONTH_NAMES[d.getMonth()].slice(0, 3);
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent =
    `${MONTH_NAMES[calendarMonth]} ${calendarYear}`;

  // Dynamic thead
  const thead = document.getElementById('calendar-thead');
  thead.innerHTML = `<tr><th style="width:140px">Semana</th>${CHANNELS_LIST.map(c =>
    `<th>${escapeHtml(c)}</th>`).join('')}</tr>`;

  const weeks = getMonthWeeks(calendarYear, calendarMonth);
  // Una pieza puede aparecer dos veces: por fecha de publicación y/o de grabación.
  const entries = [];
  contentPieces.forEach(p => {
    if (p.scheduled_date) entries.push({ piece: p, date: p.scheduled_date, kind: 'pub' });
    if (p.recording_date) entries.push({ piece: p, date: p.recording_date, kind: 'rec' });
  });

  const tbody = document.getElementById('calendar-body');
  tbody.innerHTML = weeks.map((week, i) => {
    const cells = CHANNELS_LIST.map(ch => {
      const items = entries.filter(e => {
        const d = new Date(e.date + 'T12:00:00');
        return listMatches(e.piece.channel, ch) && d >= week.start && d <= week.end;
      });
      return renderCalCell(items);
    });
    return `<tr>
      <td>
        <div class="cal-week-label">Semana ${i + 1}</div>
        <div class="cal-week-dates">${shortDate(week.start)} – ${shortDate(week.end)}</div>
      </td>
      ${cells.map(c => `<td>${c}</td>`).join('')}
    </tr>`;
  }).join('');
}

function renderCalCell(items) {
  if (!items.length) return '<span class="empty-cell">—</span>';
  // Orden interno: por fecha ascendente
  const sorted = items.slice().sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  return sorted.map(e => {
    const it = e.piece;
    const { bg } = pilarDisplay(it.pilar);
    const color = pilarPrimaryColor(it.pilar);
    const tags = pilarTagsHtml(it.pilar);
    const dateStr = formatShortDate(e.date);
    const titleText = e.kind === 'rec' ? `Grabación de ${it.title}` : it.title;
    return `
    <div class="cal-item" style="background:${bg};border-left-color:${color}" onclick="openModal(${it.id}, 'edit')">
      <div class="cal-item-head">
        <span class="cal-item-tags">${tags}</span>
        ${dateStr ? `<span class="cal-item-date">${escapeHtml(dateStr)}</span>` : ''}
      </div>
      <div class="cal-item-title">${escapeHtml(titleText)}</div>
    </div>`;
  }).join('');
}

/* ─── Content Modal ─── */
async function openModal(id, focus) {
  const piece = getPiece(id);
  if (!piece) return;
  currentPieceId = id;

  // Pilar tag header: una pill por cada pilar seleccionado
  const tag = document.getElementById('modal-tag');
  tag.innerHTML = pilarTagsHtml(piece.pilar);
  tag.style.background = '';
  tag.style.color = '';

  // Title
  document.getElementById('modal-title-input').value = piece.title;

  // Pilar multi-select (checkboxes)
  const pieceKeys = parsePilars(piece.pilar);
  document.getElementById('modal-pilar-checklist').innerHTML = buildPilarChecklistHtml(pieceKeys);

  // Channel multi-select (checkboxes)
  document.getElementById('modal-channel-checklist').innerHTML =
    buildSimpleChecklistHtml(CHANNELS_LIST, parseList(piece.channel));

  // Format multi-select (checkboxes)
  document.getElementById('modal-format-checklist').innerHTML =
    buildSimpleChecklistHtml(FORMATS_LIST, parseList(piece.format));

  document.getElementById('modal-copy').value = piece.copy;
  document.getElementById('modal-date').value = piece.scheduled_date || '';
  document.getElementById('modal-recording-date').value = piece.recording_date || '';

  const noteSection = document.getElementById('modal-note-section');
  if (piece.note) {
    noteSection.style.display = 'block';
    document.getElementById('modal-note').textContent = piece.note;
  } else {
    noteSection.style.display = 'none';
  }

  const comments = await fetchCommentsForPiece(id);
  renderComments(comments);

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('closing');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (focus === 'comment') {
    setTimeout(() => document.getElementById('comment-input').focus(), 350);
  }
}

function closeModal() {
  stopVoice();
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('open', 'closing');
    document.body.style.overflow = '';
    currentPieceId = null;
  }, 300);
}

function renderComments(comments) {
  const list = document.getElementById('comment-list');
  if (!comments.length) {
    list.innerHTML = '<p style="font-size:0.8rem;color:var(--ink-light);font-style:italic">Sin comentarios todavía</p>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const typeBg = c.type === 'comment' ? '#EAEAF4' : '#F5E3DB';
    const typeColor = c.type === 'comment' ? '#2B2D6B' : '#B5533E';
    return `
    <div class="comment-item" data-comment-id="${c.id}">
      <div class="comment-item-header">
        <span class="comment-item-type" style="background:${typeBg};color:${typeColor}">${c.type === 'comment' ? 'Comentario' : 'Sugerencia'}</span>
        <span class="comment-item-time">${formatTime(c.created_at)}</span>
      </div>
      <p class="comment-item-text">${escapeHtml(c.text)}</p>
      <button class="comment-delete" onclick="deleteComment(${c.id})">&times;</button>
    </div>`;
  }).join('');
}

/* ─── Content Actions ─── */
async function saveCopy() {
  if (!currentPieceId) return;
  const piece = getPiece(currentPieceId);
  const newTitle = document.getElementById('modal-title-input').value.trim();
  const newPilar = getPilarChecklistValue('modal-pilar-checklist');
  const newChannel = getPilarChecklistValue('modal-channel-checklist');
  const newFormat = getPilarChecklistValue('modal-format-checklist');
  const newCopy = document.getElementById('modal-copy').value;
  const newDate = document.getElementById('modal-date').value || null;
  const newRecordingDate = document.getElementById('modal-recording-date').value || null;

  if (!newTitle) { alert('El título no puede estar vacío.'); return; }
  if (!newPilar) { alert('Seleccioná al menos un pilar.'); return; }
  if (!newChannel) { alert('Seleccioná al menos un canal.'); return; }
  if (!newFormat) { alert('Seleccioná al menos un formato.'); return; }

  const updates = {};
  if (newTitle !== piece.title) updates.title = newTitle;
  if (newPilar !== piece.pilar) updates.pilar = newPilar;
  if (newChannel !== piece.channel) updates.channel = newChannel;
  if (newFormat !== piece.format) updates.format = newFormat;
  if (newCopy !== piece.copy) updates.copy = newCopy;
  if (newDate !== (piece.scheduled_date || null)) updates.scheduled_date = newDate;
  if (newRecordingDate !== (piece.recording_date || null)) updates.recording_date = newRecordingDate;

  if (Object.keys(updates).length) {
    updates.updated_at = new Date().toISOString();
    const { error } = await sb.from('content_pieces').update(updates).eq('id', currentPieceId);
    if (!error) {
      Object.assign(piece, updates);
      await incrementEdits();
      renderGrid();
      renderCalendar();
    }
  }
  closeModal();
}

async function addComment() {
  if (!currentPieceId) return;
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const comment = await insertComment(currentPieceId, currentCommentType, text);
  if (comment) {
    input.value = '';
    totalComments++;
    const comments = await fetchCommentsForPiece(currentPieceId);
    renderComments(comments);
  }
}

async function deleteComment(commentId) {
  const ok = await removeComment(commentId);
  if (ok && currentPieceId) {
    totalComments = Math.max(0, totalComments - 1);
    const comments = await fetchCommentsForPiece(currentPieceId);
    renderComments(comments);
  }
}

/* ─── Delete Piece ─── */
async function deletePiece(id) {
  if (!confirm('¿Eliminar esta pieza de contenido?')) return;
  const { error } = await sb.from('content_pieces').delete().eq('id', id);
  if (error) { console.error('Error deleting piece:', error); return; }
  contentPieces = contentPieces.filter(c => c.id !== id);
  totalComments = await fetchTotalComments();
  renderGrid();
}

/* ─── Settings Modal (Pillars, Channels, Formats) ─── */
let editingPillars = [];
let editingChannels = [];
let editingFormats = [];

function openPillarsModal() {
  editingPillars = Object.entries(PILARS).map(([key, p]) => ({ key, label: p.label, color: p.color, bg: p.bg }));
  editingChannels = [...CHANNELS_LIST];
  editingFormats = [...FORMATS_LIST];
  renderPillarsList();
  renderSimpleList('channels-list', editingChannels, 'channel');
  renderSimpleList('formats-list', editingFormats, 'format');
  const overlay = document.getElementById('pillars-overlay');
  overlay.classList.remove('closing');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePillarsModal() {
  const overlay = document.getElementById('pillars-overlay');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('open', 'closing');
    document.body.style.overflow = '';
  }, 300);
}

function renderPillarsList() {
  const list = document.getElementById('pillars-list');
  list.innerHTML = editingPillars.map((p, i) => `
    <div class="pillar-row">
      <input type="color" class="pillar-color-input" value="${p.color}" data-index="${i}">
      <input type="text" class="pillar-key-input" value="${escapeHtml(p.key)}" data-index="${i}" placeholder="clave" maxlength="20">
      <input type="text" class="pillar-label-input" value="${escapeHtml(p.label)}" data-index="${i}" placeholder="Nombre del pilar">
      <button class="btn btn-danger" onclick="removePillarRow(${i})">Eliminar</button>
    </div>
  `).join('');

  // Bind change events
  list.querySelectorAll('.pillar-color-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = +e.target.dataset.index;
      editingPillars[idx].color = e.target.value;
      editingPillars[idx].bg = lightenColor(e.target.value, 0.82);
    });
  });
  list.querySelectorAll('.pillar-key-input').forEach(el => {
    el.addEventListener('input', e => {
      editingPillars[+e.target.dataset.index].key = e.target.value.toLowerCase().replace(/[^a-z0-9_-]/g, '');
      e.target.value = editingPillars[+e.target.dataset.index].key;
    });
  });
  list.querySelectorAll('.pillar-label-input').forEach(el => {
    el.addEventListener('input', e => {
      editingPillars[+e.target.dataset.index].label = e.target.value;
    });
  });
}

function removePillarRow(index) {
  editingPillars.splice(index, 1);
  renderPillarsList();
}

function addPillarRow() {
  editingPillars.push({ key: '', label: '', color: '#666666', bg: '#ECECEC' });
  renderPillarsList();
  const inputs = document.querySelectorAll('.pillar-key-input');
  inputs[inputs.length - 1]?.focus();
}

/* ─── Simple Lists (Channels & Formats) ─── */
function renderSimpleList(containerId, arr, type) {
  const list = document.getElementById(containerId);
  list.innerHTML = arr.map((name, i) => `
    <div class="simple-list-row">
      <input type="text" class="simple-list-input" value="${escapeHtml(name)}" data-type="${type}" data-index="${i}" placeholder="Nombre">
      <button class="btn btn-danger" onclick="removeSimpleItem('${type}', ${i})">Eliminar</button>
    </div>
  `).join('');

  list.querySelectorAll('.simple-list-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = +e.target.dataset.index;
      if (e.target.dataset.type === 'channel') editingChannels[idx] = e.target.value;
      else editingFormats[idx] = e.target.value;
    });
  });
}

function removeSimpleItem(type, index) {
  if (type === 'channel') {
    editingChannels.splice(index, 1);
    renderSimpleList('channels-list', editingChannels, 'channel');
  } else {
    editingFormats.splice(index, 1);
    renderSimpleList('formats-list', editingFormats, 'format');
  }
}

function addChannelRow() {
  editingChannels.push('');
  renderSimpleList('channels-list', editingChannels, 'channel');
  const inputs = document.querySelectorAll('#channels-list .simple-list-input');
  inputs[inputs.length - 1]?.focus();
}

function addFormatRow() {
  editingFormats.push('');
  renderSimpleList('formats-list', editingFormats, 'format');
  const inputs = document.querySelectorAll('#formats-list .simple-list-input');
  inputs[inputs.length - 1]?.focus();
}

async function savePillars() {
  // Validate pillars
  const valid = editingPillars.every(p => p.key && p.label);
  if (!valid) { alert('Cada pilar necesita una clave y un nombre.'); return; }

  // Validate channels & formats (filter empty)
  const cleanChannels = editingChannels.map(c => c.trim()).filter(Boolean);
  const cleanFormats = editingFormats.map(f => f.trim()).filter(Boolean);
  if (!cleanChannels.length) { alert('Necesitás al menos un canal.'); return; }
  if (!cleanFormats.length) { alert('Necesitás al menos un formato.'); return; }

  // Save pillars
  const currentKeys = Object.keys(PILARS);
  const newKeys = editingPillars.map(p => p.key);
  const deleted = currentKeys.filter(k => !newKeys.includes(k));
  for (const key of deleted) await deletePillar(key);
  for (const p of editingPillars) await upsertPillar(p.key, p.label, p.color, p.bg);

  // Save channels & formats
  await syncChannels(cleanChannels);
  await syncFormats(cleanFormats);

  // Reload
  await fetchPillars();
  await fetchChannels();
  await fetchFormats();
  renderFilters();
  renderGrid();
  renderCalendar();
  closePillarsModal();
}

/* ─── Voice-to-Text (Web Speech API) ─── */
let recognition = null;
let isRecording = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voice-btn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-AR';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    const textarea = document.getElementById('modal-copy');
    const base = textarea.dataset.voiceBase || '';
    textarea.value = base + finalTranscript + (interim ? interim : '');
  };

  recognition.onend = () => {
    if (isRecording) {
      // Restart if still recording (continuous mode workaround)
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') {
      stopVoice();
    }
  };
}

function toggleVoice() {
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  if (!recognition) return;
  const textarea = document.getElementById('modal-copy');
  const currentVal = textarea.value;
  textarea.dataset.voiceBase = currentVal + (currentVal && !currentVal.endsWith('\n') && !currentVal.endsWith(' ') ? ' ' : '');

  isRecording = true;
  document.getElementById('voice-btn').classList.add('recording');
  try { recognition.start(); } catch(e) {}
}

function stopVoice() {
  if (!recognition) return;
  isRecording = false;
  document.getElementById('voice-btn').classList.remove('recording');
  try { recognition.stop(); } catch(e) {}
}

/* ─── New Idea Modal ─── */
function openNewIdeaModal() {
  // Preselecciona el primer pilar/canal/formato por conveniencia
  const firstKey = Object.keys(PILARS)[0];
  document.getElementById('new-idea-pilar-checklist').innerHTML =
    buildPilarChecklistHtml(firstKey ? [firstKey] : []);
  document.getElementById('new-idea-channel-checklist').innerHTML =
    buildSimpleChecklistHtml(CHANNELS_LIST, CHANNELS_LIST[0] ? [CHANNELS_LIST[0]] : []);
  document.getElementById('new-idea-format-checklist').innerHTML =
    buildSimpleChecklistHtml(FORMATS_LIST, FORMATS_LIST[0] ? [FORMATS_LIST[0]] : []);
  document.getElementById('new-idea-title').value = '';
  document.getElementById('new-idea-copy').value = '';
  document.getElementById('new-idea-note').value = '';
  document.getElementById('new-idea-date').value = '';
  document.getElementById('new-idea-recording-date').value = '';
  const overlay = document.getElementById('new-idea-overlay');
  overlay.classList.add('open');
  overlay.classList.remove('closing');
  setTimeout(() => document.getElementById('new-idea-title').focus(), 100);
}

function closeNewIdeaModal() {
  const overlay = document.getElementById('new-idea-overlay');
  overlay.classList.add('closing');
  setTimeout(() => { overlay.classList.remove('open', 'closing'); }, 350);
}

async function saveNewIdea() {
  const title = document.getElementById('new-idea-title').value.trim();
  const pilar = getPilarChecklistValue('new-idea-pilar-checklist');
  const channel = getPilarChecklistValue('new-idea-channel-checklist');
  const format = getPilarChecklistValue('new-idea-format-checklist');
  const copy = document.getElementById('new-idea-copy').value.trim();
  const note = document.getElementById('new-idea-note').value.trim() || null;
  const scheduled_date = document.getElementById('new-idea-date').value || null;
  const recording_date = document.getElementById('new-idea-recording-date').value || null;

  if (!title || !copy) { alert('Completá al menos el título y el copy.'); return; }
  if (!pilar) { alert('Seleccioná al menos un pilar.'); return; }
  if (!channel) { alert('Seleccioná al menos un canal.'); return; }
  if (!format) { alert('Seleccioná al menos un formato.'); return; }

  const { data, error } = await sb.from('content_pieces')
    .insert({ pilar, channel, format, title, copy, note, scheduled_date, recording_date })
    .select()
    .single();

  if (error) { console.error('Error creating idea:', error); alert('Error al crear la idea.'); return; }

  contentPieces.push(data);
  // Si la idea tiene fecha (publicación o grabación), saltar el calendario a ese mes
  // para que el usuario la vea aunque esté en otro mes distinto al actual.
  const jumpTo = data.scheduled_date || data.recording_date;
  if (jumpTo) {
    const d = new Date(jumpTo + 'T12:00:00');
    if (!isNaN(d)) {
      calendarYear = d.getFullYear();
      calendarMonth = d.getMonth();
    }
  }
  renderGrid();
  renderCalendar();
  closeNewIdeaModal();
}

  calendarMonth--;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  renderCalendar();
});
document.getElementById('cal-next').addEventListener('click', () => {
  calendarMonth++;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderCalendar();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closePillarsModal();
    closeNewIdeaModal();
  }
});

  await Promise.all([fetchPillars(), fetchChannels(), fetchFormats(), fetchContent()]);

  totalComments = await fetchTotalComments();
  renderFilters();
  bindSortEvents();
  renderGrid();

  initVoice();
})();
