<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisimic · Content Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── Reset & Variables ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --ink: #0A0A0A;
  --ink-muted: #6B6560;
  --ink-light: #9E9893;
  --border: #E5E0D8;
  --border-light: #EFEBE5;
  --accent: #B5533E;
  --accent-hover: #9E4532;
  --gold: #C9A96E;
  --gold-light: #F0E6D2;
  --danger: #C53030;
  --danger-bg: #FEE2E2;

  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --radius: 4px;
  --radius-lg: 8px;
  --shadow-sm: 0 1px 3px rgba(10,10,10,0.04);
  --shadow-md: 0 4px 20px rgba(10,10,10,0.08);
  --shadow-lg: 0 12px 40px rgba(10,10,10,0.12);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  line-height: 1.5;
}

/* ─── Grain Overlay ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}

/* ─── Header ─── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  background: rgba(245, 243, 238, 0.92);
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 40px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.logo-img {
  height: 40px;
  width: auto;
  display: block;
  mix-blend-mode: multiply;
}
.logo-sub {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  border-left: 1px solid var(--border);
  padding-left: 8px;
  margin-left: 2px;
}

/* ─── Nav Tabs ─── */
.nav-tabs {
  display: flex;
  gap: 2px;
  background: var(--border-light);
  border-radius: 6px;
  padding: 3px;
}
.nav-tab {
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 8px 20px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}

/* ─── Main Container ─── */
.main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 40px 80px;
}

/* ─── Status Bar ─── */
.status-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  margin-bottom: 36px;
  box-shadow: var(--shadow-sm);
}
.stat {
  background: var(--surface);
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stat-value {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 300;
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.stat-label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
}

/* ─── Filters ─── */
.filters {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.filter-label {
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--ink-light);
  margin-right: 8px;
}
.filter-btn {
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 7px 16px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-btn:hover {
  border-color: var(--ink-muted);
  color: var(--ink);
}
.filter-btn.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.filter-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
}
.filter-btn.active .filter-dot { background: var(--surface) !important; }

/* ─── Manage Pillars Button ─── */
.manage-pillars-btn {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  padding: 7px 12px;
  border: 1px dashed var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--ink-light);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 4px;
}
.manage-pillars-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.manage-pillars-btn svg { width: 14px; height: 14px; }

/* ─── Content Grid ─── */
.content-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

/* ─── Content Card ─── */
.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
  opacity: 0;
  transform: translateY(12px);
  animation: cardIn 0.5s ease forwards;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: var(--border);
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

.card-stripe { height: 3px; width: 100%; }
.card-body { padding: 20px 22px 18px; }

.card-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.card-tag {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 3px;
}
.card-channel, .card-format {
  font-size: 0.7rem;
  color: var(--ink-light);
  letter-spacing: 0.02em;
}
.card-channel::before {
  content: '·';
  margin-right: 6px;
  color: var(--border);
}
.card-title {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.25;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.card-copy {
  font-size: 0.85rem;
  color: var(--ink-muted);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 16px;
}
.card-actions {
  display: flex;
  gap: 8px;
  border-top: 1px solid var(--border-light);
  padding-top: 14px;
}
.btn {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  padding: 7px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
  text-transform: uppercase;
}
.btn-primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.btn-primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}
.btn-outline {
  background: transparent;
  color: var(--ink-muted);
  border-color: var(--border);
}
.btn-outline:hover {
  border-color: var(--ink);
  color: var(--ink);
}
.btn-danger {
  background: transparent;
  color: var(--danger);
  border-color: var(--danger);
  padding: 5px 10px;
  font-size: 0.7rem;
}
.btn-danger:hover {
  background: var(--danger);
  color: white;
}

/* ─── Modal (shared) ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(10, 10, 10, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.modal-overlay.open {
  display: flex;
  opacity: 1;
}
.modal-overlay.closing { opacity: 0; }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 680px;
  max-height: 88vh;
  border-radius: 12px 12px 4px 4px;
  overflow-y: auto;
  transform: translateY(30px);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: var(--shadow-lg);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-overlay.closing .modal { transform: translateY(30px); }

.modal-header {
  padding: 28px 32px 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.modal-close {
  background: none;
  border: 1px solid var(--border);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--ink-muted);
  transition: all var(--transition);
  flex-shrink: 0;
}
.modal-close:hover {
  border-color: var(--ink);
  color: var(--ink);
}

.modal-pillar-tag {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 3px;
}

.modal-content { padding: 20px 32px 32px; }

.modal-title {
  font-family: var(--font-display);
  font-size: 1.8rem;
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}
.modal-meta {
  font-size: 0.78rem;
  color: var(--ink-light);
  margin-bottom: 24px;
  display: flex;
  gap: 12px;
}
.modal-section { margin-bottom: 24px; }
.modal-section-label {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-light);
  margin-bottom: 8px;
}

/* ─── Textarea + Voice ─── */
.textarea-wrapper {
  position: relative;
}
.modal-textarea {
  width: 100%;
  min-height: 140px;
  font-family: var(--font-body);
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 50px 14px 16px;
  resize: vertical;
  transition: border-color var(--transition);
  background: var(--bg);
}
.modal-textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.voice-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  color: var(--ink-muted);
}
.voice-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}
.voice-btn.recording {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  animation: pulse 1.5s ease infinite;
}
.voice-btn svg { width: 16px; height: 16px; }

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(181, 83, 62, 0.4); }
  50% { box-shadow: 0 0 0 8px rgba(181, 83, 62, 0); }
}

.modal-note {
  background: var(--gold-light);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  font-size: 0.84rem;
  color: var(--ink-muted);
  line-height: 1.55;
  border-radius: 0 var(--radius) var(--radius) 0;
}
.modal-save-row {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-bottom: 28px;
}

/* ─── Comments Section ─── */
.comments-section {
  border-top: 1px solid var(--border-light);
  padding-top: 24px;
}
.comment-type-toggle {
  display: flex;
  gap: 2px;
  background: var(--border-light);
  border-radius: 4px;
  padding: 2px;
  margin-bottom: 12px;
  width: fit-content;
}
.comment-type-btn {
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 6px 14px;
  border: none;
  border-radius: 3px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
}
.comment-type-btn.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.comment-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.comment-input {
  flex: 1;
  font-family: var(--font-body);
  font-size: 0.84rem;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--ink);
  transition: border-color var(--transition);
}
.comment-input:focus {
  outline: none;
  border-color: var(--accent);
}
.comment-list { display: flex; flex-direction: column; gap: 12px; }
.comment-item {
  padding: 12px 16px;
  background: var(--bg);
  border-radius: var(--radius);
  position: relative;
}
.comment-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}
.comment-item-type {
  font-size: 0.65rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 2px;
}
.comment-item-time {
  font-size: 0.7rem;
  color: var(--ink-light);
}
.comment-item-text {
  font-size: 0.84rem;
  color: var(--ink-muted);
  line-height: 1.5;
}
.comment-delete {
  position: absolute;
  top: 10px;
  right: 10px;
  background: none;
  border: none;
  color: var(--ink-light);
  cursor: pointer;
  font-size: 0.9rem;
  opacity: 0;
  transition: opacity var(--transition);
}
.comment-item:hover .comment-delete { opacity: 1; }
.comment-delete:hover { color: var(--accent); }

/* ─── Calendar View ─── */
.calendar-view { display: none; }
.calendar-view.active { display: block; }
.ideas-view.active { display: block; }
.ideas-view { display: none; }

.calendar-wrapper {
  overflow-x: auto;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}
.calendar-table {
  width: 100%;
  min-width: 800px;
  border-collapse: collapse;
  background: var(--surface);
}
.calendar-table th {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-muted);
  padding: 16px 18px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.calendar-table td {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: top;
  min-height: 80px;
}
.calendar-table tr:last-child td { border-bottom: none; }

.cal-week-label {
  font-family: var(--font-display);
  font-size: 1.05rem;
  font-weight: 400;
  color: var(--ink);
  white-space: nowrap;
}
.cal-week-dates {
  font-size: 0.7rem;
  color: var(--ink-light);
  margin-top: 2px;
}
.cal-item {
  margin-bottom: 8px;
  padding: 8px 10px;
  border-radius: var(--radius);
  border-left: 3px solid transparent;
  transition: all var(--transition);
  cursor: pointer;
}
.cal-item:hover { transform: translateX(2px); }
.cal-item:last-child { margin-bottom: 0; }
.cal-item-pilar {
  font-size: 0.6rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  opacity: 0.7;
}
.cal-item-title {
  font-size: 0.8rem;
  font-weight: 500;
  line-height: 1.3;
  margin-top: 1px;
}
.empty-cell {
  font-size: 0.75rem;
  color: var(--ink-light);
  font-style: italic;
  opacity: 0.5;
}

/* ─── Pillars Modal ─── */
.pillars-modal-content { padding: 24px 32px 32px; }
.pillars-modal-title {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 400;
  margin-bottom: 20px;
}
.pillar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}
.pillar-row:last-of-type { border-bottom: none; }
.pillar-color-input {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  padding: 2px;
  background: var(--surface);
  -webkit-appearance: none;
  appearance: none;
}
.pillar-color-input::-webkit-color-swatch-wrapper { padding: 0; }
.pillar-color-input::-webkit-color-swatch { border: none; border-radius: 3px; }
.pillar-key-input {
  width: 80px;
  font-family: var(--font-body);
  font-size: 0.78rem;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--ink-muted);
}
.pillar-label-input {
  flex: 1;
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--ink);
}
.pillar-label-input:focus, .pillar-key-input:focus {
  outline: none;
  border-color: var(--accent);
}
.add-pillar-row {
  display: flex;
  justify-content: center;
  padding-top: 16px;
}
.add-pillar-btn {
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 500;
  padding: 8px 20px;
  border: 1px dashed var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}
.add-pillar-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .header-inner { padding: 0 20px; height: 60px; }
  .logo-sub { display: none; }
  .main { padding: 20px 20px 60px; }
  .status-bar { grid-template-columns: repeat(2, 1fr); }
  .content-grid { grid-template-columns: 1fr; }
  .modal-content, .modal-header, .pillars-modal-content { padding-left: 20px; padding-right: 20px; }
  .modal-title { font-size: 1.4rem; }
}

@media (max-width: 500px) {
  .nav-tabs { gap: 0; }
  .nav-tab { padding: 6px 14px; font-size: 0.72rem; }
  .stat { padding: 14px 16px; }
  .stat-value { font-size: 1.5rem; }
  .filters { gap: 6px; }
  .filter-btn { padding: 6px 12px; font-size: 0.72rem; }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-light); }

/* ─── Stagger Animation ─── */
.card:nth-child(1) { animation-delay: 0s; }
.card:nth-child(2) { animation-delay: 0.05s; }
.card:nth-child(3) { animation-delay: 0.1s; }
.card:nth-child(4) { animation-delay: 0.15s; }
.card:nth-child(5) { animation-delay: 0.2s; }
.card:nth-child(6) { animation-delay: 0.25s; }
.card:nth-child(7) { animation-delay: 0.3s; }
.card:nth-child(8) { animation-delay: 0.35s; }
.card:nth-child(9) { animation-delay: 0.4s; }

/* ─── State ─── */
let PILARS = {};
let contentPieces = [];
let editsCount = 0;
let totalComments = 0;
let currentFilter = 'all';
let currentCommentType = 'comment';
let currentPieceId = null;

/* ─── Supabase: Pillars ─── */
async function fetchPillars() {
  const { data, error } = await sb.from('pillars').select('*').order('key');
  if (error) { console.error('Error fetching pillars:', error); return; }
  PILARS = {};
  data.forEach(p => { PILARS[p.key] = { label: p.label, color: p.color, bg: p.bg }; });
}

async function upsertPillar(key, label, color, bg) {
  const { error } = await sb.from('pillars').upsert({ key, label, color, bg });
  if (error) console.error('Error upserting pillar:', error);
}

async function deletePillar(key) {
  const { error } = await sb.from('pillars').delete().eq('key', key);
  if (error) console.error('Error deleting pillar:', error);
}

/* ─── Supabase: Content ─── */
async function fetchContent() {
  const { data, error } = await sb.from('content_pieces').select('*').order('id');
  if (error) { console.error('Error fetching content:', error); return; }
  contentPieces = data;
}

async function fetchCommentsForPiece(pieceId) {
  const { data, error } = await sb.from('comments').select('*').eq('piece_id', pieceId).order('created_at');
  if (error) { console.error('Error fetching comments:', error); return []; }
  return data || [];
}

async function fetchTotalComments() {
  const { count, error } = await sb.from('comments').select('*', { count: 'exact', head: true });
  if (error) return 0;
  return count || 0;
}

async function fetchEdits() {
  const { data, error } = await sb.from('metadata').select('value').eq('key', 'edits').single();
  if (error) return 0;
  return data?.value || 0;
}

async function updateCopy(pieceId, newCopy) {
  const { error } = await sb.from('content_pieces').update({ copy: newCopy, updated_at: new Date().toISOString() }).eq('id', pieceId);
  return !error;
}

async function incrementEdits() {
  editsCount++;
  await sb.from('metadata').update({ value: editsCount }).eq('key', 'edits');
}

async function insertComment(pieceId, type, text) {
  const { data, error } = await sb.from('comments').insert({ piece_id: pieceId, type, text }).select().single();
  if (error) return null;
  return data;
}

async function removeComment(commentId) {
  const { error } = await sb.from('comments').delete().eq('id', commentId);
  return !error;
}

/* ─── Helpers ─── */
function getPiece(id) { return contentPieces.find(c => c.id === id); }

function formatTime(iso) {
  return new Date(iso).toLocaleString('es-AR', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function pilarStyle(key, prop) {
  const p = PILARS[key];
  if (!p) return '';
  if (prop === 'color') return p.color;
  if (prop === 'bg') return p.bg;
  if (prop === 'label') return p.label;
  return '';
}

function lightenColor(hex, amount = 0.85) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const lr = Math.round(r + (255 - r) * amount);
  const lg = Math.round(g + (255 - g) * amount);
  const lb = Math.round(b + (255 - b) * amount);
  return `#${lr.toString(16).padStart(2,'0')}${lg.toString(16).padStart(2,'0')}${lb.toString(16).padStart(2,'0')}`;
}

/* ─── Stats ─── */
function updateStats() {
  document.getElementById('stat-total').textContent = contentPieces.length;
  document.getElementById('stat-edits').textContent = editsCount;
  document.getElementById('stat-comments').textContent = totalComments;
  document.getElementById('stat-pillars').textContent = Object.keys(PILARS).length;
}

/* ─── Render Filters ─── */
function renderFilters() {
  const bar = document.getElementById('filters-bar');
  const allBtn = '<button class="filter-btn active" data-filter="all">Todos</button>';
  const pillarBtns = Object.entries(PILARS).map(([key, p]) =>
    `<button class="filter-btn" data-filter="${key}">
      <span class="filter-dot" style="background:${p.color}"></span>
      ${escapeHtml(p.label)}
    </button>`
  ).join('');
  const manageBtn = `<button class="manage-pillars-btn" id="open-pillars-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>`;

  bar.innerHTML = `<span class="filter-label">Filtrar</span>${allBtn}${pillarBtns}${manageBtn}`;
  bindFilterEvents();
}

function bindFilterEvents() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });
  const openBtn = document.getElementById('open-pillars-btn');
  if (openBtn) openBtn.addEventListener('click', openPillarsModal);
}

/* ─── Render Cards ─── */
function renderGrid() {
  const grid = document.getElementById('content-grid');
  const filtered = currentFilter === 'all'
    ? contentPieces
    : contentPieces.filter(c => c.pilar === currentFilter);

  grid.innerHTML = filtered.map((piece, i) => {
    const color = pilarStyle(piece.pilar, 'color') || '#999';
    const bg = pilarStyle(piece.pilar, 'bg') || '#f0f0f0';
    const label = pilarStyle(piece.pilar, 'label') || piece.pilar;
    return `
    <article class="card" style="animation-delay:${i * 0.05}s" data-id="${piece.id}">
      <div class="card-stripe" style="background:${color}"></div>
      <div class="card-body">
        <div class="card-meta">
          <span class="card-tag" style="background:${bg};color:${color}">${escapeHtml(label)}</span>
          <span class="card-channel">${escapeHtml(piece.channel)}</span>
          <span class="card-format">· ${escapeHtml(piece.format)}</span>
        </div>
        <h3 class="card-title">${escapeHtml(piece.title)}</h3>
        <p class="card-copy">${escapeHtml(piece.copy).replace(/\n/g, ' ')}</p>
        <div class="card-actions">
          <button class="btn btn-primary" onclick="openModal(${piece.id}, 'edit')">Ver y editar</button>
          <button class="btn btn-outline" onclick="openModal(${piece.id}, 'comment')">Comentar</button>
          <button class="btn btn-danger" style="margin-left:auto" onclick="event.stopPropagation();deletePiece(${piece.id})">Eliminar</button>
        </div>
      </div>
    </article>`;
  }).join('');
}

/* ─── Render Calendar ─── */
function renderCalendar() {
  const tbody = document.getElementById('calendar-body');
  tbody.innerHTML = CALENDAR_DATA.map(week => `
    <tr>
      <td>
        <div class="cal-week-label">${week.label}</div>
        <div class="cal-week-dates">${week.dates}</div>
      </td>
      <td>${renderCalCell(week.instagram)}</td>
      <td>${renderCalCell(week.tiktok)}</td>
      <td>${renderCalCell(week.web)}</td>
      <td>${renderCalCell(week.email)}</td>
    </tr>
  `).join('');
}

function renderCalCell(items) {
  if (!items.length) return '<span class="empty-cell">—</span>';
  return items.map(it => {
    const color = pilarStyle(it.pilar, 'color') || '#999';
    const bg = pilarStyle(it.pilar, 'bg') || '#f0f0f0';
    const label = pilarStyle(it.pilar, 'label') || it.pilar;
    return `
    <div class="cal-item" style="background:${bg};border-left-color:${color}" onclick="openModal(${it.id}, 'edit')">
      <div class="cal-item-pilar">${escapeHtml(label)}</div>
      <div class="cal-item-title">${escapeHtml(it.title)}</div>
    </div>`;
  }).join('');
}

/* ─── Content Modal ─── */
async function openModal(id, focus) {
  const piece = getPiece(id);
  if (!piece) return;
  currentPieceId = id;

  const color = pilarStyle(piece.pilar, 'color') || '#999';
  const bg = pilarStyle(piece.pilar, 'bg') || '#f0f0f0';
  const label = pilarStyle(piece.pilar, 'label') || piece.pilar;

  const tag = document.getElementById('modal-tag');
  tag.textContent = label;
  tag.style.background = bg;
  tag.style.color = color;

  document.getElementById('modal-title').textContent = piece.title;
  document.getElementById('modal-channel').textContent = piece.channel;
  document.getElementById('modal-format').textContent = piece.format;
  document.getElementById('modal-copy').value = piece.copy;

  const noteSection = document.getElementById('modal-note-section');
  if (piece.note) {
    noteSection.style.display = 'block';
    document.getElementById('modal-note').textContent = piece.note;
  } else {
    noteSection.style.display = 'none';
  }

  const comments = await fetchCommentsForPiece(id);
  renderComments(comments);

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('closing');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (focus === 'comment') {
    setTimeout(() => document.getElementById('comment-input').focus(), 350);
  }
}

function closeModal() {
  stopVoice();
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('open', 'closing');
    document.body.style.overflow = '';
    currentPieceId = null;
  }, 300);
}

function renderComments(comments) {
  const list = document.getElementById('comment-list');
  if (!comments.length) {
    list.innerHTML = '<p style="font-size:0.8rem;color:var(--ink-light);font-style:italic">Sin comentarios todavía</p>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const typeBg = c.type === 'comment' ? '#EAEAF4' : '#F5E3DB';
    const typeColor = c.type === 'comment' ? '#2B2D6B' : '#B5533E';
    return `
    <div class="comment-item" data-comment-id="${c.id}">
      <div class="comment-item-header">
        <span class="comment-item-type" style="background:${typeBg};color:${typeColor}">${c.type === 'comment' ? 'Comentario' : 'Sugerencia'}</span>
        <span class="comment-item-time">${formatTime(c.created_at)}</span>
      </div>
      <p class="comment-item-text">${escapeHtml(c.text)}</p>
      <button class="comment-delete" onclick="deleteComment(${c.id})">&times;</button>
    </div>`;
  }).join('');
}

/* ─── Content Actions ─── */
async function saveCopy() {
  if (!currentPieceId) return;
  const piece = getPiece(currentPieceId);
  const newCopy = document.getElementById('modal-copy').value;
  if (newCopy !== piece.copy) {
    const ok = await updateCopy(currentPieceId, newCopy);
    if (ok) {
      piece.copy = newCopy;
      await incrementEdits();
      renderGrid();
      updateStats();
    }
  }
  closeModal();
}

async function addComment() {
  if (!currentPieceId) return;
  const input = document.getElementById('comment-input');
  const text = input.value.trim();
  if (!text) return;
  const comment = await insertComment(currentPieceId, currentCommentType, text);
  if (comment) {
    input.value = '';
    totalComments++;
    updateStats();
    const comments = await fetchCommentsForPiece(currentPieceId);
    renderComments(comments);
  }
}

async function deleteComment(commentId) {
  const ok = await removeComment(commentId);
  if (ok && currentPieceId) {
    totalComments = Math.max(0, totalComments - 1);
    updateStats();
    const comments = await fetchCommentsForPiece(currentPieceId);
    renderComments(comments);
  }
}

/* ─── Delete Piece ─── */
async function deletePiece(id) {
  if (!confirm('¿Eliminar esta pieza de contenido?')) return;
  const { error } = await sb.from('content_pieces').delete().eq('id', id);
  if (error) { console.error('Error deleting piece:', error); return; }
  contentPieces = contentPieces.filter(c => c.id !== id);
  totalComments = await fetchTotalComments();
  renderGrid();
  updateStats();
}

/* ─── Pillars Modal ─── */
let editingPillars = [];

function openPillarsModal() {
  editingPillars = Object.entries(PILARS).map(([key, p]) => ({ key, label: p.label, color: p.color, bg: p.bg }));
  renderPillarsList();
  const overlay = document.getElementById('pillars-overlay');
  overlay.classList.remove('closing');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePillarsModal() {
  const overlay = document.getElementById('pillars-overlay');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('open', 'closing');
    document.body.style.overflow = '';
  }, 300);
}

function renderPillarsList() {
  const list = document.getElementById('pillars-list');
  list.innerHTML = editingPillars.map((p, i) => `
    <div class="pillar-row">
      <input type="color" class="pillar-color-input" value="${p.color}" data-index="${i}">
      <input type="text" class="pillar-key-input" value="${escapeHtml(p.key)}" data-index="${i}" placeholder="clave" maxlength="20">
      <input type="text" class="pillar-label-input" value="${escapeHtml(p.label)}" data-index="${i}" placeholder="Nombre del pilar">
      <button class="btn btn-danger" onclick="removePillarRow(${i})">Eliminar</button>
    </div>
  `).join('');

  // Bind change events
  list.querySelectorAll('.pillar-color-input').forEach(el => {
    el.addEventListener('input', e => {
      const idx = +e.target.dataset.index;
      editingPillars[idx].color = e.target.value;
      editingPillars[idx].bg = lightenColor(e.target.value, 0.82);
    });
  });
  list.querySelectorAll('.pillar-key-input').forEach(el => {
    el.addEventListener('input', e => {
      editingPillars[+e.target.dataset.index].key = e.target.value.toLowerCase().replace(/[^a-z0-9_-]/g, '');
      e.target.value = editingPillars[+e.target.dataset.index].key;
    });
  });
  list.querySelectorAll('.pillar-label-input').forEach(el => {
    el.addEventListener('input', e => {
      editingPillars[+e.target.dataset.index].label = e.target.value;
    });
  });
}

function removePillarRow(index) {
  editingPillars.splice(index, 1);
  renderPillarsList();
}

function addPillarRow() {
  editingPillars.push({ key: '', label: '', color: '#666666', bg: '#ECECEC' });
  renderPillarsList();
  // Focus the new key input
  const inputs = document.querySelectorAll('.pillar-key-input');
  inputs[inputs.length - 1]?.focus();
}

async function savePillars() {
  // Validate
  const valid = editingPillars.every(p => p.key && p.label);
  if (!valid) { alert('Cada pilar necesita una clave y un nombre.'); return; }

  // Find deleted pillars
  const currentKeys = Object.keys(PILARS);
  const newKeys = editingPillars.map(p => p.key);
  const deleted = currentKeys.filter(k => !newKeys.includes(k));

  // Delete removed pillars
  for (const key of deleted) {
    await deletePillar(key);
  }

  // Upsert all
  for (const p of editingPillars) {
    await upsertPillar(p.key, p.label, p.color, p.bg);
  }

  // Reload
  await fetchPillars();
  renderFilters();
  renderGrid();
  renderCalendar();
  updateStats();
  closePillarsModal();
}

/* ─── Voice-to-Text (Web Speech API) ─── */
let recognition = null;
let isRecording = false;

function initVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voice-btn').style.display = 'none';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'es-AR';
  recognition.continuous = true;
  recognition.interimResults = true;

  let finalTranscript = '';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        finalTranscript += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    const textarea = document.getElementById('modal-copy');
    const base = textarea.dataset.voiceBase || '';
    textarea.value = base + finalTranscript + (interim ? interim : '');
  };

  recognition.onend = () => {
    if (isRecording) {
      // Restart if still recording (continuous mode workaround)
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onerror = (e) => {
    if (e.error !== 'no-speech') {
      stopVoice();
    }
  };
}

function toggleVoice() {
  if (isRecording) {
    stopVoice();
  } else {
    startVoice();
  }
}

function startVoice() {
  if (!recognition) return;
  const textarea = document.getElementById('modal-copy');
  const currentVal = textarea.value;
  textarea.dataset.voiceBase = currentVal + (currentVal && !currentVal.endsWith('\n') && !currentVal.endsWith(' ') ? ' ' : '');

  isRecording = true;
  document.getElementById('voice-btn').classList.add('recording');
  try { recognition.start(); } catch(e) {}
}

function stopVoice() {
  if (!recognition) return;
  isRecording = false;
  document.getElementById('voice-btn').classList.remove('recording');
  try { recognition.stop(); } catch(e) {}
}

/* ─── New Idea Modal ─── */
function openNewIdeaModal() {
  const pilarSelect = document.getElementById('new-idea-pilar');
  pilarSelect.innerHTML = Object.entries(PILARS).map(([key, p]) =>
    `<option value="${key}">${escapeHtml(p.label)}</option>`
  ).join('');
  document.getElementById('new-idea-title').value = '';
  document.getElementById('new-idea-copy').value = '';
  document.getElementById('new-idea-note').value = '';
  const overlay = document.getElementById('new-idea-overlay');
  overlay.classList.add('open');
  overlay.classList.remove('closing');
  setTimeout(() => document.getElementById('new-idea-title').focus(), 100);
}

function closeNewIdeaModal() {
  const overlay = document.getElementById('new-idea-overlay');
  overlay.classList.add('closing');
  setTimeout(() => { overlay.classList.remove('open', 'closing'); }, 350);
}

async function saveNewIdea() {
  const title = document.getElementById('new-idea-title').value.trim();
  const pilar = document.getElementById('new-idea-pilar').value;
  const channel = document.getElementById('new-idea-channel').value;
  const format = document.getElementById('new-idea-format').value;
  const copy = document.getElementById('new-idea-copy').value.trim();
  const note = document.getElementById('new-idea-note').value.trim() || null;

  if (!title || !copy) { alert('Completá al menos el título y el copy.'); return; }

  const { data, error } = await sb.from('content_pieces')
    .insert({ pilar, channel, format, title, copy, note })
    .select()
    .single();

  if (error) { console.error('Error creating idea:', error); alert('Error al crear la idea.'); return; }

  contentPieces.push(data);
  renderGrid();
  renderCalendar();
  updateStats();
  closeNewIdeaModal();
}

/* ─── Event Listeners ─── */
// New idea
document.getElementById('btn-new-idea').addEventListener('click', openNewIdeaModal);
document.getElementById('new-idea-close').addEventListener('click', closeNewIdeaModal);
document.getElementById('new-idea-cancel').addEventListener('click', closeNewIdeaModal);
document.getElementById('new-idea-save').addEventListener('click', saveNewIdea);
document.getElementById('new-idea-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeNewIdeaModal();
});

// View tabs
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const view = tab.dataset.view;
    document.getElementById('view-ideas').classList.toggle('active', view === 'ideas');
    document.getElementById('view-calendar').classList.toggle('active', view === 'calendar');
  });
});

// Content modal
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-save').addEventListener('click', saveCopy);
document.getElementById('comment-submit').addEventListener('click', addComment);
document.getElementById('comment-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addComment();
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// Comment type
document.querySelectorAll('.comment-type-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.comment-type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCommentType = btn.dataset.type;
  });
});

// Pillars modal
document.getElementById('pillars-close').addEventListener('click', closePillarsModal);
document.getElementById('pillars-cancel').addEventListener('click', closePillarsModal);
document.getElementById('pillars-save').addEventListener('click', savePillars);
document.getElementById('add-pillar-btn').addEventListener('click', addPillarRow);
document.getElementById('pillars-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closePillarsModal();
});

// Voice
document.getElementById('voice-btn').addEventListener('click', toggleVoice);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closePillarsModal();
    closeNewIdeaModal();
  }
});

/* ─── Init ─── */
(async function init() {
  await fetchPillars();
  await fetchContent();
  editsCount = await fetchEdits();
  totalComments = await fetchTotalComments();
  renderFilters();
  renderGrid();
  renderCalendar();
  updateStats();
  initVoice();
})();
</script>
